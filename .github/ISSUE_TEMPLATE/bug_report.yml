name: 🐛 Bug Report
description: File a report to help us improve memreps
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version/Commit Hash
      description: Which version of the app are you running? (e.g., v1.0.2 or a specific commit)
      placeholder: e.g., main-branch-latest
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Describe how we can trigger this issue.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant terminal or browser console logs.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this isn't a duplicate.
          required: true
        - label: I am using the latest version of the app.
          required: false